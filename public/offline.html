<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Cryptocoinex</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:#07090e;color:#e2e8f0;font-family:-apple-system,system-ui,sans-serif;text-align:center;padding:24px;}
    .o{max-width:360px;}
    .ic{width:64px;height:64px;border-radius:16px;margin:0 auto 20px;background:linear-gradient(135deg,#f59e0b,#d97706);
      display:flex;align-items:center;justify-content:center;font-size:28px;}
    h1{font-size:1.3rem;margin:0 0 8px;}
    p{color:#64748b;font-size:.9rem;line-height:1.6;}
    button{margin-top:18px;background:#f59e0b;color:#0f172a;border:none;border-radius:9px;padding:11px 22px;font-weight:800;cursor:pointer;}
  </style>
</head>
<body>
  <div class="o">
    <div class="ic">📡</div>
    <h1>You're offline</h1>
    <p>Cryptocoinex needs an internet connection to stream live prices. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
